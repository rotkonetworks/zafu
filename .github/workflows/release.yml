name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  DO_NOT_TRACK: 1
  CRX3_VERSION: 1.1.3
  # Chrome Web Store extension IDs (derived from each pubkey).
  CWS_PROD_ITEM_ID: oojfeopgoeapfgcfhmlpfgabcbhkglck
  CWS_BETA_ITEM_ID: ppgbkpjgpggkibdojjocgndbbhiempjf

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install crx3
        run: npm install -g "crx3@${CRX3_VERSION}"

      - name: Resolve version
        id: vars
        run: |
          ref="${GITHUB_REF_NAME:-}"
          if [ -z "$ref" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ref="$(git describe --tags --always --dirty)"
          fi
          echo "version=$ref" >> "$GITHUB_OUTPUT"
          # Prerelease tags (v22.0.0-beta.1, -rc.1, -alpha.2) → publish beta
          # channel only. Clean tags (v22.0.0) → publish both prod + beta.
          if echo "$ref" | grep -qE '(alpha|beta|rc)'; then
            echo "channel=beta-only" >> "$GITHUB_OUTPUT"
          else
            echo "channel=both" >> "$GITHUB_OUTPUT"
          fi

      - name: Build extension (production)
        working-directory: apps/extension
        run: NODE_OPTIONS="--max-old-space-size=8192 --import=tsx" npx webpack --config webpack.prod-config.ts

      - name: Build extension (beta)
        working-directory: apps/extension
        run: NODE_OPTIONS="--max-old-space-size=8192 --import=tsx" npx webpack --config webpack.beta-config.ts

      # CWS rejects manifests that carry the `key` field (it's a dev-only
      # aid for "load unpacked" stability). Strip it from the dist manifests
      # before zipping or CRX-packing — the pubkey still lives in the CRX
      # header for self-hosted installs, and the CWS assigns its own.
      - name: Strip `key` from dist manifests
        working-directory: apps/extension
        run: |
          for m in dist/manifest.json beta-dist/manifest.json; do
            jq 'del(.key)' "$m" > "$m.tmp" && mv "$m.tmp" "$m"
            echo "--- $m ---"
            jq '{name, version, description_len: (.description|length), has_key: has("key")}' "$m"
          done

      - name: Stage CRX signing keys
        id: crxkeys
        env:
          CRX_PROD_KEY: ${{ secrets.CRX_PROD_KEY }}
          CRX_BETA_KEY: ${{ secrets.CRX_BETA_KEY }}
        run: |
          if [ -z "${CRX_PROD_KEY:-}" ]; then
            echo "::error::CRX_PROD_KEY secret is not set"
            exit 1
          fi
          if [ -z "${CRX_BETA_KEY:-}" ]; then
            echo "::error::CRX_BETA_KEY secret is not set"
            exit 1
          fi
          keydir="$(mktemp -d)"
          umask 077
          prod="$keydir/zafu-prod.pem"
          beta="$keydir/zafu-beta.pem"
          printf '%s\n' "$CRX_PROD_KEY" > "$prod"
          printf '%s\n' "$CRX_BETA_KEY" > "$beta"
          chmod 0600 "$prod" "$beta"
          echo "prod=$prod" >> "$GITHUB_OUTPUT"
          echo "beta=$beta" >> "$GITHUB_OUTPUT"
          echo "keydir=$keydir" >> "$GITHUB_OUTPUT"

      - name: Pack + sign prod CRX
        env:
          KEY: ${{ steps.crxkeys.outputs.prod }}
          VER: ${{ steps.vars.outputs.version }}
        run: |
          # resolve beta-dist output dir (matches webpack.beta-config.ts defaults)
          cd apps/extension/dist
          zip -qr "$GITHUB_WORKSPACE/zafu-prod-${VER}.zip" .
          cd "$GITHUB_WORKSPACE"
          crx3 --keyPath "$KEY" \
               --crxPath "zafu-prod-${VER}.crx" \
               apps/extension/dist/manifest.json

      - name: Pack + sign beta CRX
        env:
          KEY: ${{ steps.crxkeys.outputs.beta }}
          VER: ${{ steps.vars.outputs.version }}
        run: |
          cd apps/extension/beta-dist
          zip -qr "$GITHUB_WORKSPACE/zafu-beta-${VER}.zip" .
          cd "$GITHUB_WORKSPACE"
          crx3 --keyPath "$KEY" \
               --crxPath "zafu-beta-${VER}.crx" \
               apps/extension/beta-dist/manifest.json

      - name: Remove CRX signing keys
        if: always()
        env:
          KEYDIR: ${{ steps.crxkeys.outputs.keydir }}
        run: |
          if [ -n "${KEYDIR:-}" ] && [ -d "$KEYDIR" ]; then
            find "$KEYDIR" -type f -exec shred -u {} \; 2>/dev/null || true
            rm -rf "$KEYDIR"
          fi

      - name: Generate checksums
        env:
          VER: ${{ steps.vars.outputs.version }}
        run: |
          sha256sum \
            "zafu-prod-${VER}.zip" \
            "zafu-prod-${VER}.crx" \
            "zafu-beta-${VER}.zip" \
            "zafu-beta-${VER}.crx" \
            > sha256sums.txt
          cat sha256sums.txt

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          VER: ${{ steps.vars.outputs.version }}
          CHANNEL: ${{ steps.vars.outputs.channel }}
        run: |
          is_prerelease=""
          if [ "$CHANNEL" = "beta-only" ]; then
            is_prerelease="--prerelease"
          fi
          gh release create "${{ github.ref_name }}" \
            "zafu-prod-${VER}.zip" \
            "zafu-prod-${VER}.crx" \
            "zafu-beta-${VER}.zip" \
            "zafu-beta-${VER}.crx" \
            "sha256sums.txt" \
            --title "zafu ${{ github.ref_name }}" \
            $is_prerelease \
            --generate-notes

      # ─── Chrome Web Store — upload + submit for review ───
      # Both prod and beta get uploaded as new drafts and submitted for
      # review automatically. Google's review humans still have to approve,
      # but nothing on our side is manual after `git tag`.
      #
      # Auth is a direct JWT→OAuth exchange because google-github-actions/
      # auth@v2 with token_format=access_token uses iamcredentials.google
      # apis.com which 403s for the chromewebstore scope even with the
      # API enabled and the SA granted serviceAccountTokenCreator on
      # itself. The google-auth Python library signs the JWT locally and
      # exchanges it at oauth2.googleapis.com/token — no IAM round-trip.
      - name: Publish to Chrome Web Store
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          CWS_PUBLISHER_JSON: ${{ secrets.CWS_PUBLISHER_JSON }}
          VER: ${{ steps.vars.outputs.version }}
          CHANNEL: ${{ steps.vars.outputs.channel }}
        run: |
          set -eu
          pip install --quiet google-auth requests
          keyfile="$(mktemp)"
          printf '%s' "$CWS_PUBLISHER_JSON" > "$keyfile"
          TOKEN="$(python3 - "$keyfile" <<'PY'
          import sys
          from google.oauth2 import service_account
          from google.auth.transport.requests import Request
          creds = service_account.Credentials.from_service_account_file(
              sys.argv[1],
              scopes=['https://www.googleapis.com/auth/chromewebstore'],
          )
          creds.refresh(Request())
          print(creds.token)
          PY
          )"
          shred -u "$keyfile" 2>/dev/null || rm -f "$keyfile"
          upload_and_publish() {
            local tag="$1"      # "prod" or "beta"
            local item_id="$2"
            local zip="zafu-${tag}-${VER}.zip"
            echo "─── $tag ($item_id) ───"
            upload_resp="$(curl -sS --fail-with-body \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "x-goog-api-version: 2" \
              -X PUT -T "$zip" \
              "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${item_id}")"
            echo "upload: $upload_resp"
            state="$(echo "$upload_resp" | python3 -c "import json,sys; print(json.load(sys.stdin).get('uploadState',''))")"
            if [ "$state" != "SUCCESS" ] && [ "$state" != "IN_PROGRESS" ]; then
              echo "::error::$tag upload failed, state=$state"
              exit 1
            fi
            publish_resp="$(curl -sS --fail-with-body \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "x-goog-api-version: 2" \
              -H "Content-Length: 0" \
              -X POST \
              "https://www.googleapis.com/chromewebstore/v1.1/items/${item_id}/publish")"
            echo "publish: $publish_resp"
          }
          # Beta always publishes. Prod only on clean (non-prerelease) tags.
          upload_and_publish beta "${CWS_BETA_ITEM_ID}"
          if [ "${CHANNEL:-both}" = "both" ]; then
            upload_and_publish prod "${CWS_PROD_ITEM_ID}"
          else
            echo "Skipping prod CWS publish — prerelease tag ($VER) only ships beta."
          fi

      - name: Upload artifacts (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: zafu-${{ steps.vars.outputs.version }}
          path: |
            zafu-prod-${{ steps.vars.outputs.version }}.zip
            zafu-prod-${{ steps.vars.outputs.version }}.crx
            zafu-beta-${{ steps.vars.outputs.version }}.zip
            zafu-beta-${{ steps.vars.outputs.version }}.crx
            sha256sums.txt
          if-no-files-found: error
