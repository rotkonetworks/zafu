name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  DO_NOT_TRACK: 1
  CRX3_VERSION: 1.1.3
  # Chrome Web Store extension IDs (derived from each pubkey).
  CWS_PROD_ITEM_ID: oojfeopgoeapfgcfhmlpfgabcbhkglck
  CWS_BETA_ITEM_ID: ppgbkpjgpggkibdojjocgndbbhiempjf

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # required for google-github-actions/auth

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install crx3
        run: npm install -g "crx3@${CRX3_VERSION}"

      - name: Resolve version
        id: vars
        run: |
          ref="${GITHUB_REF_NAME:-}"
          if [ -z "$ref" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ref="$(git describe --tags --always --dirty)"
          fi
          echo "version=$ref" >> "$GITHUB_OUTPUT"

      - name: Build extension (production)
        working-directory: apps/extension
        run: NODE_OPTIONS="--max-old-space-size=8192 --import=tsx" npx webpack --config webpack.prod-config.ts

      - name: Build extension (beta)
        working-directory: apps/extension
        run: NODE_OPTIONS="--max-old-space-size=8192 --import=tsx" npx webpack --config webpack.beta-config.ts

      - name: Stage CRX signing keys
        id: crxkeys
        env:
          CRX_PROD_KEY: ${{ secrets.CRX_PROD_KEY }}
          CRX_BETA_KEY: ${{ secrets.CRX_BETA_KEY }}
        run: |
          if [ -z "${CRX_PROD_KEY:-}" ]; then
            echo "::error::CRX_PROD_KEY secret is not set"
            exit 1
          fi
          if [ -z "${CRX_BETA_KEY:-}" ]; then
            echo "::error::CRX_BETA_KEY secret is not set"
            exit 1
          fi
          keydir="$(mktemp -d)"
          umask 077
          prod="$keydir/zafu-prod.pem"
          beta="$keydir/zafu-beta.pem"
          printf '%s\n' "$CRX_PROD_KEY" > "$prod"
          printf '%s\n' "$CRX_BETA_KEY" > "$beta"
          chmod 0600 "$prod" "$beta"
          echo "prod=$prod" >> "$GITHUB_OUTPUT"
          echo "beta=$beta" >> "$GITHUB_OUTPUT"
          echo "keydir=$keydir" >> "$GITHUB_OUTPUT"

      - name: Pack + sign prod CRX
        env:
          KEY: ${{ steps.crxkeys.outputs.prod }}
          VER: ${{ steps.vars.outputs.version }}
        run: |
          # resolve beta-dist output dir (matches webpack.beta-config.ts defaults)
          cd apps/extension/dist
          zip -qr "$GITHUB_WORKSPACE/zafu-prod-${VER}.zip" .
          cd "$GITHUB_WORKSPACE"
          crx3 --keyPath "$KEY" \
               --crxPath "zafu-prod-${VER}.crx" \
               apps/extension/dist/manifest.json

      - name: Pack + sign beta CRX
        env:
          KEY: ${{ steps.crxkeys.outputs.beta }}
          VER: ${{ steps.vars.outputs.version }}
        run: |
          cd apps/extension/beta-dist
          zip -qr "$GITHUB_WORKSPACE/zafu-beta-${VER}.zip" .
          cd "$GITHUB_WORKSPACE"
          crx3 --keyPath "$KEY" \
               --crxPath "zafu-beta-${VER}.crx" \
               apps/extension/beta-dist/manifest.json

      - name: Remove CRX signing keys
        if: always()
        env:
          KEYDIR: ${{ steps.crxkeys.outputs.keydir }}
        run: |
          if [ -n "${KEYDIR:-}" ] && [ -d "$KEYDIR" ]; then
            find "$KEYDIR" -type f -exec shred -u {} \; 2>/dev/null || true
            rm -rf "$KEYDIR"
          fi

      - name: Generate checksums
        env:
          VER: ${{ steps.vars.outputs.version }}
        run: |
          sha256sum \
            "zafu-prod-${VER}.zip" \
            "zafu-prod-${VER}.crx" \
            "zafu-beta-${VER}.zip" \
            "zafu-beta-${VER}.crx" \
            > sha256sums.txt
          cat sha256sums.txt

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          VER: ${{ steps.vars.outputs.version }}
        run: |
          is_prerelease=""
          if echo "${VER}" | grep -qE '(alpha|beta|rc)'; then
            is_prerelease="--prerelease"
          fi
          gh release create "${{ github.ref_name }}" \
            "zafu-prod-${VER}.zip" \
            "zafu-prod-${VER}.crx" \
            "zafu-beta-${VER}.zip" \
            "zafu-beta-${VER}.crx" \
            "sha256sums.txt" \
            --title "zafu ${{ github.ref_name }}" \
            $is_prerelease \
            --generate-notes

      # ─── Chrome Web Store — upload + submit for review ───
      # Both prod and beta get uploaded as new drafts and submitted for
      # review automatically. Google's review humans still have to approve,
      # but nothing on our side is manual after `git tag`.
      - name: Auth with Chrome Web Store
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        id: gauth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.CWS_PUBLISHER_JSON }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/chromewebstore

      - name: Publish to Chrome Web Store
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          TOKEN: ${{ steps.gauth.outputs.access_token }}
          VER: ${{ steps.vars.outputs.version }}
        run: |
          set -eu
          upload_and_publish() {
            local tag="$1"      # "prod" or "beta"
            local item_id="$2"
            local zip="zafu-${tag}-${VER}.zip"
            echo "─── $tag ($item_id) ───"
            upload_resp="$(curl -sS --fail-with-body \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "x-goog-api-version: 2" \
              -X PUT -T "$zip" \
              "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${item_id}")"
            echo "upload: $upload_resp"
            state="$(echo "$upload_resp" | python3 -c "import json,sys; print(json.load(sys.stdin).get('uploadState',''))")"
            if [ "$state" != "SUCCESS" ] && [ "$state" != "IN_PROGRESS" ]; then
              echo "::error::$tag upload failed, state=$state"
              exit 1
            fi
            publish_resp="$(curl -sS --fail-with-body \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "x-goog-api-version: 2" \
              -H "Content-Length: 0" \
              -X POST \
              "https://www.googleapis.com/chromewebstore/v1.1/items/${item_id}/publish")"
            echo "publish: $publish_resp"
          }
          upload_and_publish prod "${CWS_PROD_ITEM_ID}"
          upload_and_publish beta "${CWS_BETA_ITEM_ID}"

      - name: Upload artifacts (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: zafu-${{ steps.vars.outputs.version }}
          path: |
            zafu-prod-${{ steps.vars.outputs.version }}.zip
            zafu-prod-${{ steps.vars.outputs.version }}.crx
            zafu-beta-${{ steps.vars.outputs.version }}.zip
            zafu-beta-${{ steps.vars.outputs.version }}.crx
            sha256sums.txt
          if-no-files-found: error
